<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0f14" />
      <stop offset="1" stop-color="#15100c" />
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#ff6a1a" stop-opacity="0.35" />
      <stop offset="1" stop-color="#ff6a1a" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff6a1a" />
      <stop offset="0.5" stop-color="#ff9d2e" />
      <stop offset="1" stop-color="#ffbe4d" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- акцентная полоса слева -->
  <rect x="90" y="150" width="6" height="330" rx="3" fill="url(#grad)" />

  <!-- эйкоп -->
  <text x="128" y="180" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" letter-spacing="4" fill="#ff9d2e">МАРКЕТИНГОВОЕ АГЕНТСТВО ПОЛНОГО ЦИКЛА</text>

  <!-- название -->
  <text x="124" y="300" font-family="Arial, Helvetica, sans-serif" font-size="118" font-weight="800" letter-spacing="-3" fill="#f4ece4">Core <tspan fill="url(#grad)">Agency</tspan></text>

  <!-- слоган -->
  <text x="128" y="392" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700" fill="#f4ece4">Растим прибыль через <tspan fill="#ff9d2e">бренд</tspan></text>

  <!-- услуги -->
  <text x="128" y="470" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="500" fill="rgba(244,236,228,0.78)">Реклама · Продвижение · Брендинг · Трафик · Сайты · Контент</text>

  <!-- регион -->
  <text x="128" y="540" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="600" fill="rgba(244,236,228,0.6)">Москва · Санкт-Петербург</text>
</svg>
